version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Slottet/API/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - slottet-network

  # Blazor Frontend Service
  blazor:
    build:
      context: .
      dockerfile: Slottet/SlottetBlazor/Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - slottet-network

  # Database Service (MySQL)
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - slottet-network

networks:
  slottet-network:
    driver: bridge

volumes:
  db-data:
