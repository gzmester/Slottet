version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Slottet/API/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    networks:
      - slottet-network

  # Blazor Frontend Service
  blazor:
    build:
      context: .
      dockerfile: Slottet/SlottetBlazor/Dockerfile
    ports:
      - "5002:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - slottet-network

networks:
  slottet-network:
    driver: bridge
