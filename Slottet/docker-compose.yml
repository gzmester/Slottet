services:

  # ----------------------------------------------------------------
  # API — ASP.NET Core Web API (port 5000 by default)
  # All database access and business logic lives here.
  # ----------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    container_name: slottet-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT — uses __ as section separator so .NET binds to Jwt:Key etc.
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER:-SlottetApi}
      Jwt__Audience: ${JWT_AUDIENCE:-SlottetBlazor}
      # CORS — set to the public URL of the Blazor container (browser-facing)
      BLAZOR_ORIGIN: http://localhost:${BLAZOR_PORT:-5050}
    networks:
      - slottet-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------------
  # Blazor — ASP.NET Core Blazor Server (port 5050 by default)
  # Pure frontend — calls the API over the internal Docker network.
  # ----------------------------------------------------------------
  blazor:
    build:
      context: .
      dockerfile: SlottetBlazor/Dockerfile
    container_name: slottet-blazor
    restart: unless-stopped
    ports:
      - "${BLAZOR_PORT:-5050}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Internal Docker network address of the API container
      ApiBaseUrl: http://slottet-api:8080
    depends_on:
      api:
        condition: service_healthy
    networks:
      - slottet-net

networks:
  slottet-net:
    driver: bridge
